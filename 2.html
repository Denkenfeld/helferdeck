<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HelferDeck Builder</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --glass:        rgba(255,255,255,0.62);
  --glass-border: rgba(255,255,255,0.75);
  --glass-deep:   rgba(255,255,255,0.45);
  --blur:         18px;
  --text:         #2d2d3a;
  --text-soft:    #6b6b80;
  --text-muted:   #a0a0b0;
  --radius:       18px;
  --radius-sm:    12px;
  --accent:       #5b7fff;
  --success:      #34c77b;
  --danger:       #ff5f7e;
  --shadow:       0 4px 24px rgba(100,120,200,0.10);
  --shadow-card:  0 2px 16px rgba(100,120,200,0.09);
  --bg-color:     #fdf8f4;
  --subtle-line:  rgba(45, 45, 58, 0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  min-height: 100vh;
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  background: var(--bg-color);
  overflow-x: hidden;
}

#bokeh-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.app {
  position: relative;
  z-index: 1;
  max-width: 560px;
  margin: 0 auto;
  padding: 1.5rem 1rem 6rem;
  transition: opacity 0.3s ease;
}

/* ── UI Utilities ── */
.glass { background: var(--glass); backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur)); box-shadow: var(--shadow); }
.glass-btn { background: rgba(255,255,255,0.7); color: var(--text); cursor: pointer; border-radius: var(--radius-sm); padding: 12px; display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; transition: all 0.2s; }
.glass-btn:hover { background: #fff; box-shadow: var(--shadow-card); transform: translateY(-1px); }
.glass-btn i { font-size: 20px; color: var(--accent); }

/* ── Globale, dezente Außenlinien ── */
.deck-card, .editor-header, .area-card, .task-item, .glass-btn, .icon-btn, .add-btn, .seamless-input, .emoji-option { border: 1px solid var(--subtle-line) !important; }

/* ── Seamless Inputs ── */
.seamless-input { width: 100%; background: rgba(255,255,255,0.3); font-family: inherit; color: inherit; outline: none; border-radius: 8px; padding: 6px 10px; transition: background 0.2s, border-color 0.2s; }
.seamless-input::placeholder { color: var(--text-muted); }
.seamless-input:focus { background: rgba(255,255,255,0.8); border-color: rgba(91,127,255,0.4) !important; }

/* ── Dashboard (Home) ── */
.dash-header { margin-bottom: 24px; padding: 0 4px; }
.dash-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
.dash-subtitle { color: var(--text-soft); font-size: 13px; }
.action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }
.section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; margin-bottom: 12px; padding: 0 4px; }
.deck-list { display: flex; flex-direction: column; gap: 10px; }
.deck-card { padding: 16px; border-radius: var(--radius); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: transform 0.2s; }
.deck-card:active { transform: scale(0.98); }
.deck-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 2px;}
.deck-card p { font-size: 12px; color: var(--text-soft); }

/* ── Editor View ── */
.nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.icon-btn { background: rgba(255,255,255,0.5); width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text); transition: background 0.2s; }
.icon-btn:hover { background: #fff; }
.editor-header { border-radius: var(--radius); padding: 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px;}
.header-title-input { font-size: 20px; font-weight: 700; letter-spacing: -0.5px;}
.header-date-input { font-size: 13px; color: var(--text-soft); }

.area-card { border-radius: var(--radius); padding: 16px; margin-bottom: 16px; background: var(--glass-deep); }
.area-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.emoji-btn { font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; padding: 0; background: rgba(255,255,255,0.5); flex-shrink: 0; }
.emoji-btn:hover { background: rgba(255,255,255,0.8); }
.area-title-input { font-size: 15px; font-weight: 600; flex: 1; }
.remove-btn { color: var(--danger); background: transparent; border: none; cursor: pointer; padding: 8px; font-size: 18px; opacity: 0.5; border-radius: 50%;}
.remove-btn:hover { opacity: 1; background: rgba(255,95,126,0.1); }

.task-item { background: rgba(255,255,255,0.55); border-radius: var(--radius-sm); padding: 12px; margin-bottom: 10px; display: flex; gap: 10px; align-items: flex-start; }
.task-inputs { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.task-title-input { font-size: 13px; font-weight: 600; }
.task-req-input { font-size: 12px; color: var(--text-soft); }
.task-slots-input { font-size: 12px; width: 60px; text-align: center; }

.add-btn { width: 100%; background: transparent; color: var(--accent); padding: 12px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 6px; transition: background 0.2s; }
.add-btn:hover { background: rgba(91,127,255,0.05); }

/* ── Floating Action Bar (Editor) ── */
.fab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--subtle-line); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.fab-btn { background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 12px rgba(91,127,255,0.3); display: flex; align-items: center; gap: 6px; }

/* ── Emoji Modal ── */
.emoji-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.15); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
.emoji-modal-overlay.show { opacity: 1; pointer-events: auto; }
.emoji-grid-container { background: var(--glass); border: 1px solid var(--glass-border); backdrop-filter: blur(24px); border-radius: var(--radius); padding: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); width: 90%; max-width: 320px; }
.emoji-grid-title { font-size: 12px; font-weight: 600; color: var(--text-soft); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center;}
.emoji-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
.emoji-option { font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.4); padding: 10px 0; border-radius: 8px; transition: background 0.2s; display: flex; align-items: center; justify-content: center; }
.emoji-option:hover { background: rgba(255,255,255,0.9); }
</style>
</head>
<body>

<canvas id="bokeh-canvas"></canvas>
<div class="app" id="app"></div>

<div id="emoji-modal" class="emoji-modal-overlay" onclick="if(event.target===this) closeEmojiPicker()">
  <div class="emoji-grid-container">
    <div class="emoji-grid-title">Icon auswählen</div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   BOKEH BACKGROUND
═══════════════════════════════════════════════ */
(function() {
  const canvas = document.getElementById('bokeh-canvas');
  const ctx = canvas.getContext('2d');
  const palette = [[255, 215, 110], [175, 220, 255], [195, 240, 215], [255, 200, 170]];
  let orbs = [];
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initOrbs() { orbs = Array.from({ length: 5 }, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, r: 150 + Math.random() * 200, dx: (Math.random() - 0.5) * 0.1, dy: (Math.random() - 0.5) * 0.1, col: palette[Math.floor(Math.random() * palette.length)], alpha: 0.15 })); }
  function step() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = 'var(--bg-color)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    orbs.forEach(o => {
      o.x += o.dx; o.y += o.dy;
      if (o.x < -o.r) o.x = canvas.width + o.r; if (o.x > canvas.width + o.r) o.x = -o.r;
      if (o.y < -o.r) o.y = canvas.height + o.r; if (o.y > canvas.height + o.r) o.y = -o.r;
      const grd = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
      const [r,g,b] = o.col;
      grd.addColorStop(0, `rgba(${r},${g},${b},${o.alpha})`); grd.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
    });
    requestAnimationFrame(step);
  }
  window.addEventListener('resize', () => { resize(); initOrbs(); }); resize(); initOrbs(); step();
})();

/* ═══════════════════════════════════════════════
   EMOJI PICKER
═══════════════════════════════════════════════ */
const EMOJIS = ['🎪','🍖','☕','🎯','🍔','🍻','🎨','🎸','⚽','🛠','🎈','🧸','🧁','🌭','🥗','🎤','🎫','🧹','🗑','⭐'];
let currentEmojiArea = null;
function initEmojiGrid() { document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e => `<button class="emoji-option" onclick="selectEmoji('${e}')">${e}</button>`).join(''); }
function openEmojiPicker(areaId) { currentEmojiArea = areaId; document.getElementById('emoji-modal').classList.add('show'); }
function closeEmojiPicker() { currentEmojiArea = null; document.getElementById('emoji-modal').classList.remove('show'); }
function selectEmoji(emoji) { if(currentEmojiArea) { updateArea(currentEmojiArea, 'icon', emoji); } closeEmojiPicker(); }

/* ═══════════════════════════════════════════════
   APP STATE & DATA LOGIC
═══════════════════════════════════════════════ */
let decks = JSON.parse(localStorage.getItem('helperDecks')) || [];
let view = 'home';
let currentDeckId = null;

function saveToLocal() { localStorage.setItem('helperDecks', JSON.stringify(decks)); }
function generateId() { return Math.random().toString(36).substring(2, 9); }

function createNewDeck(isTemplate = false) {
  const newDeck = {
    id: generateId(), title: isTemplate ? "Schulfest 2026" : "", date: isTemplate ? "Samstag · 12:00 – 16:00 Uhr" : "",
    areas: isTemplate ? [{ id: generateId(), title: "Kuchen- & Kaffeebuffet", icon: "☕", tasks: [{ id: generateId(), title: "Kuchenspende", req: "Bitte beschriften", slots: 5 }]}] : []
  };
  decks.push(newDeck); saveToLocal(); openEditor(newDeck.id);
}
function openEditor(id) { currentDeckId = id; view = 'edit'; render(); }
function goHome() { saveToLocal(); currentDeckId = null; view = 'home'; render(); }
function updateDeckData(key, value) { const deck = decks.find(d => d.id === currentDeckId); if(deck) deck[key] = value; saveToLocal(); }
function addArea() { const deck = decks.find(d => d.id === currentDeckId); deck.areas.push({ id: generateId(), title: "", icon: "📌", tasks: [] }); render(); }
function removeArea(aId) { const deck = decks.find(d => d.id === currentDeckId); deck.areas = deck.areas.filter(a => a.id !== aId); render(); }
function addTask(aId) { const deck = decks.find(d => d.id === currentDeckId); const area = deck.areas.find(a => a.id === aId); area.tasks.push({ id: generateId(), title: "", req: "", slots: 2 }); render(); }
function removeTask(aId, tId) { const deck = decks.find(d => d.id === currentDeckId); const area = deck.areas.find(a => a.id === aId); area.tasks = area.tasks.filter(t => t.id !== tId); render(); }
function updateArea(aId, key, value) { const deck = decks.find(d => d.id === currentDeckId); const area = deck.areas.find(a => a.id === aId); area[key] = value; saveToLocal(); if(key === 'icon') render(); }
function updateTask(aId, tId, key, value) { const deck = decks.find(d => d.id === currentDeckId); const area = deck.areas.find(a => a.id === aId); const task = area.tasks.find(t => t.id === tId); if(key === 'slots') value = parseInt(value) || 1; task[key] = value; saveToLocal(); }
function removeDeck() { if(confirm("Deck wirklich löschen?")) { decks = decks.filter(d => d.id !== currentDeckId); goHome(); } }

/* ═══════════════════════════════════════════════
   FULL HTML EXPORT GENERATOR
═══════════════════════════════════════════════ */
function exportHTML() {
  saveToLocal();
  const deck = decks.find(d => d.id === currentDeckId);
  const deckName = deck.title ? deck.title.replace(/\s+/g, '_') : 'Neues_Deck';
  
  // Stelle sicher, dass die Datenstruktur "helpers: []" enthält, damit das Frontend nicht abstürzt
  const cleanAreas = deck.areas.map(a => ({
    ...a,
    tasks: a.tasks.map(t => ({ ...t, helpers: t.helpers || [] }))
  }));

  const areasJSON = JSON.stringify(cleanAreas);
  const titleSafe = (deck.title || 'Neues Event').replace(/"/g, '&quot;');
  const dateSafe = (deck.date || 'Kein Datum').replace(/"/g, '&quot;');

  // Der generierte Code enthält das gesamte eigenständige Frontend
  const generatedHTML = `<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${titleSafe} – Helfer-Anmeldeplan</title>

}

<body>
<canvas id="bokeh-canvas"></canvas>
<div class="app" id="app"></div>
<div class="admin-bar">
  <label class="admin-label" onclick="toggleAdmin()">
    <div class="toggle" id="adm-toggle"></div>
    <span>Admin-Ansicht</span>
  </label>
  <span class="admin-hint" id="adm-hint">Kontakte ausgeblendet</span>
</div>
<div class="toast" id="toast"></div>

<script>
(function(){
  const canvas=document.getElementById('bokeh-canvas'), ctx=canvas.getContext('2d');
  const palette=[[255,215,110],[175,220,255],[195,240,215],[255,200,170],[160,228,255],[255,230,140]];
  let orbs=[];
  function resize(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
  function initOrbs(){ orbs=Array.from({length:7},()=>({ x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:180+Math.random()*220, dx:(Math.random()-0.5)*0.12, dy:(Math.random()-0.5)*0.12, col:palette[Math.floor(Math.random()*palette.length)], alpha:0.13+Math.random()*0.12 })); }
  function step(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fdf8f4'; ctx.fillRect(0,0,canvas.width,canvas.height);
    orbs.forEach(o=>{
      o.x+=o.dx; o.y+=o.dy;
      if(o.x<-o.r) o.x=canvas.width+o.r; if(o.x>canvas.width+o.r) o.x=-o.r;
      if(o.y<-o.r) o.y=canvas.height+o.r; if(o.y>canvas.height+o.r) o.y=-o.r;
      const grd=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      const [r,g,b]=o.col;
      grd.addColorStop(0,\`rgba(\${r},\${g},\${b},\${o.alpha})\`);
      grd.addColorStop(1,\`rgba(\${r},\${g},\${b},0)\`);
      ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fillStyle=grd; ctx.fill();
    });
    requestAnimationFrame(step);
  }
  window.addEventListener('resize', ()=>{resize();initOrbs();}); resize();initOrbs();step();
})();

const state = {
  admin: false,
  myNames: new Set(),
  openAreas: {},
  openForms: {},
  title: "${titleSafe}",
  date: "${dateSafe}",
  data: { areas: ${areasJSON} }
};
if(state.data.areas.length > 0) state.openAreas[state.data.areas[0].id] = true;

function totalProgress() { let total = 0, filled = 0; state.data.areas.forEach(a => a.tasks.forEach(t => { total += t.slots; filled += (t.helpers||[]).length; })); return { total, filled, pct: total > 0 ? Math.round(filled / total * 100) : 0 }; }
function showToast(msg) { const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('show'), 2200); }
function toggleAdmin() { state.admin = !state.admin; document.getElementById('adm-toggle').classList.toggle('on', state.admin); document.getElementById('adm-hint').textContent = state.admin ? 'Kontaktdaten sichtbar' : 'Kontakte ausgeblendet'; render(); }
function toggleArea(id) { state.openAreas[id] = !state.openAreas[id]; render(); }
function toggleForm(taskId) { state.openForms[taskId] = !state.openForms[taskId]; render(); }

function joinTask(areaId, taskId) {
  const name = (document.getElementById('inp-name-' + taskId)?.value || '').trim();
  const contact = (document.getElementById('inp-cont-' + taskId)?.value || '').trim();
  if (!name || !contact) { showToast('Bitte Name und Kontakt ausfüllen.'); return; }
  const area = state.data.areas.find(a => a.id === areaId);
  const task = area.tasks.find(t => t.id === taskId);
  if (!task.helpers) task.helpers = [];
  if (task.helpers.length >= task.slots) return;
  task.helpers.push({ name, contact });
  state.myNames.add(name.toLowerCase());
  state.openForms[taskId] = false;
  showToast('✓ Eingetragen: ' + name);
  render();
}
function leaveTask(areaId, taskId, idx) {
  const area = state.data.areas.find(a => a.id === areaId);
  const task = area.tasks.find(t => t.id === taskId);
  const removed = task.helpers.splice(idx, 1)[0];
  showToast('Entfernt: ' + removed.name);
  render();
}

function render() {
  const { total, filled, pct } = totalProgress();
  let areasHtml = state.data.areas.map(area => {
    const aFilled = area.tasks.reduce((s, t) => s + (t.helpers||[]).length, 0);
    const aTotal  = area.tasks.reduce((s, t) => s + t.slots, 0);
    const isOpen  = !!state.openAreas[area.id];
    let tasksHtml = '';
    if (isOpen) {
      tasksHtml = '<div class="tasks-list">' + area.tasks.map(task => {
        const helpers = task.helpers || [];
        const isFull = helpers.length >= task.slots;
        const isFormOpen = !!state.openForms[task.id];
        const filledSlots = helpers.map((h, i) => {
          const isOwn = state.myNames.has(h.name.toLowerCase());
          const canRemove = state.admin || isOwn;
          const removeBtn = canRemove ? \`<button class="slot-remove" onclick="leaveTask('\${area.id}','\${task.id}',\${i})">×</button>\` : '';
          const contactSpan = state.admin ? \`<span class="slot-contact">&nbsp;(\${h.contact})</span>\` : '';
          return \`<span class="slot filled"><span class="slot-dot"></span>\${h.name}\${contactSpan}\${removeBtn}</span>\`;
        }).join('');
        const emptySlots = Array.from({ length: task.slots - helpers.length }).map(() => \`<span class="slot empty">Frei</span>\`).join('');
        const action = isFull ? \`<span class="badge-full"><i class="ti ti-circle-check"></i> Besetzt</span>\` : \`<button class="btn\${isFormOpen ? ' active' : ''}" onclick="toggleForm('\${task.id}')">\${isFormOpen ? 'Schließen' : 'Eintragen'}</button>\`;
        const form = (isFormOpen && !isFull) ? \`<div class="form-panel"><div class="form-grid"><input type="text" id="inp-name-\${task.id}" placeholder="Dein Name" /><input type="email" id="inp-cont-\${task.id}" placeholder="E-Mail / Tel." /></div><div class="form-footer"><span class="privacy-note"><i class="ti ti-lock" style="color:var(--success);font-size:13px"></i> Kontakt nur für Admin</span><button class="btn btn-success" onclick="joinTask('\${area.id}','\${task.id}')">Bestätigen</button></div></div>\` : '';
        return \`<div class="task"><div class="task-body"><div class="task-row"><div class="task-text"><p class="task-title">\${task.title}</p><p class="task-req">\${task.req}</p><div class="slots-row">\${filledSlots}\${emptySlots}</div></div><div style="margin-left:8px;flex-shrink:0;padding-top:2px">\${action}</div></div></div>\${form}</div>\`;
      }).join('') + '</div>';
    }
    return \`<div class="area glass\${isOpen ? ' open' : ''}"><div class="area-header" onclick="toggleArea('\${area.id}')"><span class="area-emoji">\${area.icon}</span><div class="area-info"><p class="area-name">\${area.title}</p><p class="area-stat">\${aFilled} von \${aTotal} Plätzen belegt</p></div><i class="ti ti-chevron-down chevron\${isOpen ? ' open' : ''}"></i></div>\${tasksHtml}</div>\`;
  }).join('');

  document.getElementById('app').innerHTML = \`<div class="page-header glass"><div class="header-top"><span class="header-emoji">🎉</span><div><p class="eyebrow">HelferDeck</p><h1 class="page-title">\${state.title}</h1><p class="page-date"><i class="ti ti-calendar"></i> \${state.date}</p></div></div><div class="global-progress"><div class="progress-meta"><span>Gesamtbelegung</span><span>\${filled} / \${total} · \${pct}%</span></div><div class="progress-track"><div class="progress-fill" style="width:\${pct}%"></div></div></div></div>\${areasHtml}\`;
}
render();
<` + `/script>
</body>
</html>`;
  
  const blob = new Blob([generatedHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `HelferDeck_${deckName}.html`;
  a.click();
  URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════
   RENDER VIEWS
═══════════════════════════════════════════════ */
function render() {
  const app = document.getElementById('app');
  if (view === 'home') {
    const listHtml = decks.length === 0 
      ? `<p style="color:var(--text-muted);font-size:13px;padding: 0 4px;">Noch keine Decks vorhanden.</p>` 
      : decks.map(d => `
          <div class="deck-card glass" onclick="openEditor('${d.id}')">
            <div>
              <h3>${d.title || 'Unbenanntes Event'}</h3>
              <p>${d.areas.length} Bereiche</p>
            </div>
            <i class="ti ti-chevron-right" style="color:var(--text-muted)"></i>
          </div>
        `).join('');

    app.innerHTML = `
      <div class="dash-header">
        <h1 class="dash-title">Decks</h1>
        <p class="dash-subtitle">Organisiere dein nächstes Event</p>
      </div>
      <div class="action-grid">
        <button class="glass-btn" onclick="createNewDeck()"><i class="ti ti-plus"></i> Neues Deck</button>
        <button class="glass-btn" onclick="createNewDeck(true)"><i class="ti ti-template"></i> Vorlagen</button>
        <button class="glass-btn"><i class="ti ti-download"></i> Import</button>
      </div>
      <h2 class="section-title">Meine Decks</h2>
      <div class="deck-list">${listHtml}</div>
    `;
  } else if (view === 'edit') {
    const deck = decks.find(d => d.id === currentDeckId);
    
    const areasHtml = deck.areas.map(area => {
      const tasksHtml = area.tasks.map(task => `
        <div class="task-item">
          <div class="task-inputs">
            <input class="seamless-input task-title-input" value="${task.title}" onblur="updateTask('${area.id}', '${task.id}', 'title', this.value)" placeholder="Aufgabenname (z.B. Schicht 1)">
            <input class="seamless-input task-req-input" value="${task.req}" onblur="updateTask('${area.id}', '${task.id}', 'req', this.value)" placeholder="Voraussetzung (Optional)">
            <div style="display:flex; gap:8px; align-items:center;">
              <span style="font-size:12px;color:var(--text-muted)">Helfer-Plätze:</span>
              <input type="number" min="1" class="seamless-input task-slots-input" value="${task.slots}" onblur="updateTask('${area.id}', '${task.id}', 'slots', this.value)">
            </div>
          </div>
          <button class="remove-btn" onclick="removeTask('${area.id}', '${task.id}')" title="Aufgabe löschen"><i class="ti ti-trash"></i></button>
        </div>
      `).join('');

      return `
        <div class="area-card">
          <div class="area-header">
            <button class="seamless-input emoji-btn" onclick="openEmojiPicker('${area.id}')" title="Icon ändern">${area.icon}</button>
            <input class="seamless-input area-title-input" value="${area.title}" onblur="updateArea('${area.id}', 'title', this.value)" placeholder="Bereich benennen (z.B. Grillstand)">
            <button class="remove-btn" onclick="removeArea('${area.id}')"><i class="ti ti-x"></i></button>
          </div>
          <div style="margin-bottom:12px;">${tasksHtml}</div>
          <button class="add-btn" onclick="addTask('${area.id}')"><i class="ti ti-plus"></i> Aufgabe hinzufügen</button>
        </div>
      `;
    }).join('');

    app.innerHTML = `
      <div class="nav-bar">
        <button class="icon-btn" onclick="goHome()"><i class="ti ti-arrow-left"></i></button>
        <span style="font-size:12px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px;">Editor</span>
        <button class="icon-btn" onclick="removeDeck()"><i class="ti ti-trash"></i></button>
      </div>

      <div class="editor-header glass">
        <input class="seamless-input header-title-input" value="${deck.title}" onblur="updateDeckData('title', this.value)" placeholder="Event Titel eingeben">
        <input class="seamless-input header-date-input" value="${deck.date}" onblur="updateDeckData('date', this.value)" placeholder="Datum & Uhrzeit (z.B. Sa. 12:00 Uhr)">
      </div>

      <div class="areas-container">
        ${areasHtml}
      </div>

      <button class="add-btn glass" style="border:none; margin-top: 10px; padding: 14px; margin-bottom: 20px;" onclick="addArea()">
        <i class="ti ti-circle-plus" style="font-size:18px;"></i> Neuen Bereich anlegen
      </button>

      <div class="fab-bar">
        <span style="font-size:11px; color:var(--text-soft); font-weight:500;">Automatisches Speichern aktiv</span>
        <button class="fab-btn" onclick="exportHTML()"><i class="ti ti-code"></i> HTML Export</button>
      </div>
    `;
  }
}

// Init
initEmojiGrid();
render();
</script>
</body>
</html>
